services:
  postgres:
    build:
      context: ./docker/postgres
    command: postgres -c shared_preload_libraries=pg_cron -c cron.database_name=baskety
    environment:
      POSTGRES_DB: baskety
      POSTGRES_USER: baskety
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baskety"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  baskety:
    image: ghcr.io/willian-m/baskety:latest
    ports:
      - "8080:8080"
    volumes:
      - ./config.yaml:/etc/baskety/config.yaml:ro
      - baskety_uploads:/data/uploads
    secrets:
      - baskety_key
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  minio:
    profiles:
      - minio
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  ocr-easyocr:
    profiles: [easyocr]
    build:
      context: ./docker/ocr-easyocr
    volumes:
      - easyocr_models:/root/.EasyOCR
    environment:
      OCR_LANGUAGES: "en"
    networks:
      default:
        aliases: [ocr]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 600s
    restart: unless-stopped

  ocr-paddleocr:
    profiles: [paddleocr]
    build:
      context: ./docker/ocr-paddleocr
    volumes:
      - paddleocr_models:/root/.paddleocr
    environment:
      OCR_LANG: "en"
    networks:
      default:
        aliases: [ocr]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 600s
    restart: unless-stopped

volumes:
  postgres_data:
  baskety_uploads:
  minio_data:
  easyocr_models:
  paddleocr_models:

secrets:
  baskety_key:
    file: ./secrets/baskety_key
