name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mise
        run: |
          curl -Lo /usr/local/bin/mise https://mise.jdx.dev/mise-latest-linux-x64
          chmod +x /usr/local/bin/mise
          mise trust
          mise install

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('baskety/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Go vet
        run: cd baskety && mise exec -- go vet ./...

      - name: Install golangci-lint
        run: |
          eval "$(mise activate bash)"
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin

      - name: Run golangci-lint
        run: cd baskety && eval "$(mise activate bash)" && golangci-lint run

      - name: Run tests
        run: cd baskety && mise exec -- go test -race ./...

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable corepack and install pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm turbo run typecheck

      - name: Lint
        run: pnpm turbo run lint

      - name: Build web
        run: pnpm --filter @baskety/web... build

      # TODO: pnpm turbo run test
