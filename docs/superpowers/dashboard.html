<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baskety — Implementation Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f1f5f9;
    --card: #ffffff;
    --border: #e2e8f0;
    --text: #0f172a;
    --muted: #64748b;
    --green: #10b981;
    --green-bg: #ecfdf5;
    --green-text: #065f46;
    --amber-bg: #fffbeb;
    --amber-text: #92400e;
    --blue-bg: #eff6ff;
    --blue-text: #1e40af;
    --red: #ef4444;
    --red-bg: #fef2f2;
    --red-text: #991b1b;
    --gray-bg: #f1f5f9;
    --gray-text: #374151;
    --radius: 10px;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── Access Banner ── */
  #access-banner {
    background: #1e293b;
    color: #cbd5e1;
    font-size: 12.5px;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  #access-banner code {
    background: #334155;
    color: #e2e8f0;
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 11.5px;
    white-space: nowrap;
  }
  #access-banner.hidden { display: none; }
  #banner-dismiss {
    background: transparent;
    border: 1px solid #475569;
    color: #94a3b8;
    border-radius: 5px;
    padding: 3px 10px;
    cursor: pointer;
    font-size: 12px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  #banner-dismiss:hover { background: #334155; }

  /* ── Sticky Header ── */
  #main-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: #0f172a;
    color: #f8fafc;
    padding: 14px 24px;
    box-shadow: 0 2px 8px rgba(0,0,0,.3);
  }
  #main-header h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -.2px;
    margin-bottom: 10px;
  }
  .header-progress-row {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .overall-bar-wrap {
    flex: 1;
    min-width: 200px;
    max-width: 480px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .bar-track {
    flex: 1;
    height: 10px;
    background: #334155;
    border-radius: 99px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: var(--green);
    border-radius: 99px;
    transition: width .4s ease;
    width: 0%;
  }
  .bar-pct {
    font-size: 14px;
    font-weight: 700;
    color: var(--green);
    min-width: 40px;
    text-align: right;
  }
  .header-stats {
    display: flex;
    align-items: center;
    gap: 20px;
    font-size: 13px;
    color: #94a3b8;
    flex-wrap: wrap;
  }
  .header-stats strong { color: #e2e8f0; }
  #forecast-date { color: #e2e8f0; }
  #forecast-date.behind { color: #fca5a5; }
  #forecast-date.ahead  { color: #6ee7b7; }

  /* ── Chart Card ── */
  .chart-card {
    max-width: 880px;
    margin: 24px auto 0;
    padding: 0 16px;
  }
  .chart-inner {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 16px 20px 12px;
  }
  .chart-title {
    font-size: 11.5px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .5px;
    margin-bottom: 10px;
  }

  /* ── Main content ── */
  main {
    max-width: 880px;
    margin: 0 auto;
    padding: 12px 16px 48px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* ── Sprint Card ── */
  .sprint-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .sprint-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
    flex-wrap: wrap;
  }
  .sprint-header:hover { background: #fafafa; }
  .sprint-num {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .6px;
    color: var(--muted);
    white-space: nowrap;
    min-width: 60px;
  }
  .sprint-title {
    font-size: 14.5px;
    font-weight: 600;
    color: var(--text);
    flex: 1;
    min-width: 160px;
  }
  .sprint-dates { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .sprint-counter { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .badge {
    display: inline-flex;
    align-items: center;
    padding: 2px 9px;
    border-radius: 99px;
    font-size: 11.5px;
    font-weight: 600;
    white-space: nowrap;
  }
  .badge-not-started { background: var(--gray-bg);  color: var(--gray-text); }
  .badge-in-progress { background: var(--blue-bg);  color: var(--blue-text); }
  .badge-complete    { background: var(--green-bg); color: var(--green-text); }
  .badge-at-risk     { background: var(--red-bg);   color: var(--red-text); }
  .sprint-toggle {
    font-size: 12px;
    color: var(--muted);
    margin-left: 4px;
    transition: transform .2s;
  }
  .sprint-card.open .sprint-toggle { transform: rotate(90deg); }
  .sprint-mini-bar { height: 3px; background: var(--border); }
  .sprint-mini-fill {
    height: 100%;
    background: var(--green);
    transition: width .4s ease;
    width: 0%;
  }
  .sprint-card.at-risk .sprint-mini-fill { background: var(--red); }
  .sprint-note {
    font-size: 11.5px;
    color: var(--amber-text);
    background: var(--amber-bg);
    border-top: 1px solid #fde68a;
    padding: 5px 18px;
  }

  /* ── Task List ── */
  .sprint-tasks {
    display: none;
    padding: 6px 18px 14px;
    flex-direction: column;
    gap: 2px;
    border-top: 1px solid var(--border);
  }
  .sprint-card.open .sprint-tasks { display: flex; }

  .task-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 8px;
    border-radius: 6px;
    cursor: pointer;
    transition: background .15s;
  }
  .task-row:hover { background: #f8fafc; }
  .task-row.done  { background: var(--green-bg); }
  .task-row.done:hover { background: #d1fae5; }

  .task-check {
    width: 18px;
    height: 18px;
    border: 2px solid var(--border);
    border-radius: 4px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: white;
    transition: all .15s;
  }
  .task-row.done .task-check { background: var(--green); border-color: var(--green); }
  .task-check::after {
    content: '';
    display: none;
    width: 10px;
    height: 6px;
    border-left: 2px solid white;
    border-bottom: 2px solid white;
    transform: rotate(-45deg) translateY(-1px);
  }
  .task-row.done .task-check::after { display: block; }

  .task-id {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    min-width: 30px;
    flex-shrink: 0;
  }
  .task-label { font-size: 13.5px; color: var(--text); flex: 1; line-height: 1.4; }
  .task-row.done .task-label { text-decoration: line-through; color: #9ca3af; }
  .task-days {
    font-size: 11.5px;
    color: var(--muted);
    white-space: nowrap;
    flex-shrink: 0;
    min-width: 28px;
    text-align: right;
  }
  .task-row.done .task-days { color: #9ca3af; }

  /* ── Task Date Fields ── */
  .task-date-fields {
    display: flex;
    align-items: center;
    gap: 3px;
    flex-shrink: 0;
    margin-left: 6px;
  }
  .task-date-input {
    font-size: 11px;
    font-family: inherit;
    border: 1px solid transparent;
    border-radius: 4px;
    padding: 2px 4px;
    color: #94a3b8;
    background: transparent;
    cursor: pointer;
    width: 106px;
    transition: border-color .15s, background .15s, color .15s;
  }
  .task-date-input:hover  { border-color: var(--border); background: white; color: #374151; }
  .task-date-input:focus  { border-color: #93c5fd; background: white; color: #374151; outline: none; }
  .task-row.done .task-date-input { color: #6b7280; }
  .date-sep { font-size: 11px; color: #cbd5e1; user-select: none; }

  /* ── Footer ── */
  footer {
    max-width: 880px;
    margin: 0 auto;
    padding: 0 16px 40px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  #reset-btn {
    background: white;
    border: 1px solid #fca5a5;
    color: var(--red);
    border-radius: 6px;
    padding: 7px 14px;
    font-size: 13px;
    cursor: pointer;
    font-weight: 500;
  }
  #reset-btn:hover { background: var(--red-bg); }
  .footer-btn {
    background: white;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 7px 14px;
    font-size: 13px;
    cursor: pointer;
    font-weight: 500;
  }
  .footer-btn:hover { background: var(--bg); }
  .footer-note { font-size: 12px; color: var(--muted); }

  @media (max-width: 640px) {
    .task-date-fields { display: none; }
    .sprint-header { gap: 8px; }
    .header-stats  { font-size: 12px; gap: 10px; }
  }
</style>
</head>
<body>

<!-- ── Access Banner ── -->
<div id="access-banner">
  <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
    <strong style="color:#e2e8f0">Remote VM?</strong>
    SSH tunnel: <code>ssh -L 9000:localhost:9000 user@vm</code>
    &nbsp;·&nbsp; On VM: <code>make dashboard</code>
    &nbsp;·&nbsp; Open: <code>http://localhost:9000/dashboard.html</code>
  </div>
  <button id="banner-dismiss">✕ Dismiss</button>
</div>

<!-- ── Sticky Header ── -->
<header id="main-header">
  <h1>🧺 Baskety — Implementation Dashboard</h1>
  <div class="header-progress-row">
    <div class="overall-bar-wrap">
      <div class="bar-track"><div class="bar-fill" id="overall-fill"></div></div>

    </div>
    <div class="header-stats">
      <span><strong id="days-done">0d</strong> / <strong id="days-total">—</strong> done</span>
      <span>Planned: <strong>Oct 9, 2026</strong></span>
      <span>Forecast: <strong id="forecast-date">Oct 9, 2026</strong></span>
    </div>
  </div>
</header>

<!-- ── Chart ── -->
<div id="chart-wrap-outer"></div>

<main id="sprint-container"></main>

<footer>
  <button id="reset-btn">Reset all progress</button>
  <button class="footer-btn" id="save-btn">Save progress</button>
  <button class="footer-btn" id="load-btn">Load progress</button>
  <input type="file" id="load-input" accept=".json" style="display:none">
  <span class="footer-note">Saved in localStorage. Last updated: <span id="last-updated">never</span></span>
</footer>

// ── Constants ──────────────────────────────────────────────────────────────
const PROJECT_START = new Date("2026-06-08");
const PLANNED_END   = new Date("2026-10-09");
const STORAGE_KEY   = "baskety_progress";
const EXPANDED_KEY  = "baskety_expanded";
const DATES_KEY     = "baskety_dates";
const BANNER_KEY    = "baskety_banner_dismissed";
const TOTAL_DAYS    = SPRINTS.reduce((s, sp) => s + sp.tasks.reduce((a, t) => a + t.days, 0), 0);

// ── State ──────────────────────────────────────────────────────────────────
let checked    = JSON.parse(localStorage.getItem(STORAGE_KEY)   || "{}");
let expanded   = JSON.parse(localStorage.getItem(EXPANDED_KEY)  || "{}");
let taskDates  = JSON.parse(localStorage.getItem(DATES_KEY)     || "{}");
// taskDates["1.1"] = { start: "2026-06-08", end: "2026-06-09" }

function save() {
  localStorage.setItem(STORAGE_KEY,  JSON.stringify(checked));
  localStorage.setItem(EXPANDED_KEY, JSON.stringify(expanded));
  localStorage.setItem(DATES_KEY,    JSON.stringify(taskDates));
  const el = document.getElementById("last-updated");
  if (el) el.textContent = new Date().toLocaleString();
}

// ── Date helpers ───────────────────────────────────────────────────────────
function daysBetween(a, b) { return (b.getTime() - a.getTime()) / 86400000; }
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate() + Math.ceil(n)); return r; }
function fmtDate(d) { return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" }); }
function fmtShort(iso) {
  const d = new Date(iso + "T12:00:00Z");
  return d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
}
function todayIso() { return new Date().toISOString().slice(0, 10); }

// ── Sprint state helpers ───────────────────────────────────────────────────
function defaultExpanded(sprint) {
  if (sprint.id in expanded) return expanded[sprint.id];
  const today = new Date();
  return today >= new Date(sprint.start + "T00:00:00") && today <= new Date(sprint.end + "T23:59:59");
}

function sprintStatus(sprint) {
  const today   = new Date();
  const endDate = new Date(sprint.end + "T23:59:59");
  const done    = sprint.tasks.filter(t => checked[t.id]).length;
  if (done === sprint.tasks.length) return "complete";
  if (today > endDate) return "at-risk";
  if (done > 0) return "in-progress";
  return "not-started";
}

const STATUS_LABEL = { "not-started": "Not Started", "in-progress": "In Progress", "complete": "Complete", "at-risk": "⚠ At Risk" };
function badgeClass(s) { return "badge badge-" + s; }

// ── Header ─────────────────────────────────────────────────────────────────
function computeHeader() {
  const doneDays  = SPRINTS.reduce((s, sp) => s + sp.tasks.filter(t => checked[t.id]).reduce((a, t) => a + t.days, 0), 0);
  const today     = new Date();
  const elapsed   = Math.max(1, daysBetween(PROJECT_START, today));
  const velocity  = doneDays > 0 ? doneDays / elapsed : 0;
  const remaining = TOTAL_DAYS - doneDays;
  const forecast  = velocity > 0 ? addDays(today, remaining / velocity) : PLANNED_END;
  const pct       = Math.round((doneDays / TOTAL_DAYS) * 100);

  document.getElementById("overall-fill").style.width = pct + "%";
  document.getElementById("overall-pct").textContent  = pct + "%";
  document.getElementById("days-done").textContent    = doneDays % 1 === 0 ? doneDays + "d" : doneDays.toFixed(1) + "d";
  document.getElementById("days-total").textContent   = TOTAL_DAYS + "d";

  const fEl = document.getElementById("forecast-date");
  fEl.textContent = doneDays > 0 ? fmtDate(forecast) : fmtDate(PLANNED_END);
  fEl.className = "";
  if (doneDays > 0) {
    const diff = daysBetween(PLANNED_END, forecast);
    if (diff > 3)  fEl.classList.add("behind");
    if (diff < -3) fEl.classList.add("ahead");
  }
}

// ── Chart ──────────────────────────────────────────────────────────────────
function buildChartSVG() {
  const W = 700, H = 180;
  const ML = 38, MR = 20, MT = 22, MB = 32;
  const PW = W - ML - MR, PH = H - MT - MB;

  const t0   = PROJECT_START.getTime();
  const span = PLANNED_END.getTime() - t0;
  const today = new Date();

  const xOf = date => ML + PW * Math.max(0, Math.min(1, (new Date(date).getTime() - t0) / span));
  const yOf = d    => MT + PH * (1 - Math.min(d, TOTAL_DAYS) / TOTAL_DAYS);

  // Planned line: linear from (start, 0) → (end, TOTAL)
  const plannedD = `M${ML},${yOf(0)} L${ML + PW},${yOf(TOTAL_DAYS)}`;

  // Actual line: step function from completed tasks sorted by end date
  const events = [];
  SPRINTS.forEach(sp => sp.tasks.forEach(t => {
    if (!checked[t.id]) return;
    const end = taskDates[t.id]?.end || todayIso();
    events.push({ end, days: t.days });
  }));
  events.sort((a, b) => a.end.localeCompare(b.end));

  let cumul = 0;
  const actualParts = events.length > 0 ? [`M${ML},${yOf(0)}`] : [];
  events.forEach(ev => {
    const x = xOf(ev.end + "T23:59:59");
    actualParts.push(`L${x},${yOf(cumul)}`, `L${x},${yOf(cumul + ev.days)}`);
    cumul += ev.days;
  });
  if (events.length > 0) {
    const todayX = xOf(today);
    actualParts.push(`L${Math.min(ML + PW, todayX)},${yOf(cumul)}`);
  }

  // Today marker
  const todayX = xOf(today);
  const todayInRange = today >= PROJECT_START && today <= PLANNED_END;

  // X axis month ticks
  const monthTicks = [];
  ["2026-07-01","2026-08-01","2026-09-01","2026-10-01"].forEach(iso => {
    const d = new Date(iso + "T12:00:00");
    if (d > PROJECT_START && d < PLANNED_END)
      monthTicks.push({ x: xOf(iso + "T12:00:00"), label: d.toLocaleDateString("en-US", { month: "short" }) });
  });

  // Y axis ticks
  const yTicks = [0, 20, 40, 60, 80, TOTAL_DAYS];

  let s = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:${H}px;display:block">`;

  // Subtle grid
  yTicks.forEach(v => {
    s += `<line x1="${ML}" y1="${yOf(v)}" x2="${ML+PW}" y2="${yOf(v)}" stroke="#f1f5f9" stroke-width="1"/>`;
  });

  // Sprint boundaries (very subtle)
  SPRINTS.forEach(sp => {
    const x = xOf(sp.start + "T00:00:00");
    s += `<line x1="${x}" y1="${MT}" x2="${x}" y2="${MT+PH}" stroke="#f8fafc" stroke-width="1"/>`;
  });

  // Today line
  if (todayInRange) {
    s += `<line x1="${todayX}" y1="${MT}" x2="${todayX}" y2="${MT+PH}" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,3"/>`;
    s += `<text x="${todayX + 3}" y="${MT + 11}" fill="#94a3b8" font-size="9.5" font-family="system-ui,sans-serif">Today</text>`;
  }

  // Planned line (dashed)
  s += `<path d="${plannedD}" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3"/>`;

  // Actual line (solid green)
  if (actualParts.length > 0) {
    s += `<path d="${actualParts.join(" ")}" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;
    // Dot at the tip
    const tipX = Math.min(ML + PW, xOf(today));
    s += `<circle cx="${tipX}" cy="${yOf(cumul)}" r="4" fill="#10b981"/>`;
  }

  // Axes
  s += `<line x1="${ML}" y1="${MT}" x2="${ML}" y2="${MT+PH+2}" stroke="#e2e8f0" stroke-width="1"/>`;
  s += `<line x1="${ML-2}" y1="${MT+PH}" x2="${ML+PW}" y2="${MT+PH}" stroke="#e2e8f0" stroke-width="1"/>`;

  // Y labels + ticks
  yTicks.forEach(v => {
    const y = yOf(v);
    s += `<line x1="${ML-3}" y1="${y}" x2="${ML}" y2="${y}" stroke="#e2e8f0" stroke-width="1"/>`;
    s += `<text x="${ML-5}" y="${y+4}" text-anchor="end" fill="#94a3b8" font-size="10" font-family="system-ui,sans-serif">${v}d</text>`;
  });

  // X labels + ticks
  s += `<text x="${ML}" y="${MT+PH+16}" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui,sans-serif">Jun 8</text>`;
  monthTicks.forEach(m => {
    s += `<line x1="${m.x}" y1="${MT+PH}" x2="${m.x}" y2="${MT+PH+4}" stroke="#e2e8f0" stroke-width="1"/>`;
    s += `<text x="${m.x}" y="${MT+PH+16}" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui,sans-serif">${m.label}</text>`;
  });
  s += `<text x="${ML+PW}" y="${MT+PH+16}" text-anchor="end" fill="#94a3b8" font-size="10" font-family="system-ui,sans-serif">Oct 9</text>`;

  // Legend
  const LX = W - 110, LY = MT + 6;
  s += `<line x1="${LX}" y1="${LY}" x2="${LX+16}" y2="${LY}" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3"/>`;
  s += `<text x="${LX+20}" y="${LY+4}" fill="#94a3b8" font-size="10" font-family="system-ui,sans-serif">Planned</text>`;
  s += `<line x1="${LX}" y1="${LY+14}" x2="${LX+16}" y2="${LY+14}" stroke="#10b981" stroke-width="2"/>`;
  s += `<circle cx="${LX+8}" cy="${LY+14}" r="3" fill="#10b981"/>`;
  s += `<text x="${LX+20}" y="${LY+18}" fill="#94a3b8" font-size="10" font-family="system-ui,sans-serif">Actual</text>`;

  s += `</svg>`;
  return s;
}

function renderChart() {
  const wrap = document.getElementById("chart-wrap-outer");
  if (!wrap) return;
  wrap.innerHTML = `
    <div class="chart-card">
      <div class="chart-inner">
        <div class="chart-title">Actual vs. Planned Progress (cumulative dev-days)</div>
        ${buildChartSVG()}
      </div>
    </div>`;
}

// ── Render Sprints ─────────────────────────────────────────────────────────
function escapeHtml(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function renderSprints() {
  const container = document.getElementById("sprint-container");
  container.innerHTML = "";

  SPRINTS.forEach(sprint => {
    const status   = sprintStatus(sprint);
    const isOpen   = defaultExpanded(sprint);
    const taskDone = sprint.tasks.filter(t => checked[t.id]).length;
    const daysDone = sprint.tasks.filter(t => checked[t.id]).reduce((a, t) => a + t.days, 0);
    const totalT   = sprint.tasks.length;
    const totalD   = sprint.tasks.reduce((a, t) => a + t.days, 0);
    const pct      = totalD > 0 ? (daysDone / totalD) * 100 : 0;

    const card = document.createElement("div");
    card.className = ["sprint-card", isOpen ? "open" : "", status === "complete" ? "complete" : "", status === "at-risk" ? "at-risk" : ""].filter(Boolean).join(" ");
    card.dataset.sprintId = sprint.id;

    const taskRows = sprint.tasks.map(task => {
      const startVal = taskDates[task.id]?.start || "";
      const endVal   = taskDates[task.id]?.end   || "";
      return `
        <div class="task-row ${checked[task.id] ? "done" : ""}" data-task-id="${task.id}" role="checkbox" aria-checked="${!!checked[task.id]}" tabindex="0">
          <div class="task-check"></div>
          <span class="task-id">${task.id}</span>
          <span class="task-label">${escapeHtml(task.label)}</span>
          <span class="task-days">${task.days}d</span>
          <span class="task-date-fields" onclick="event.stopPropagation()">
            <input type="date" class="task-date-input" data-task-id="${task.id}" data-field="start" value="${startVal}" title="Start date">
            <span class="date-sep">→</span>
            <input type="date" class="task-date-input" data-task-id="${task.id}" data-field="end" value="${endVal}" title="End date">
          </span>
        </div>`;
    }).join("");

    card.innerHTML = `
      <div class="sprint-header" role="button" aria-expanded="${isOpen}">
        <span class="sprint-num">Sprint ${sprint.id}</span>
        <span class="sprint-title">${sprint.title}</span>
        <span class="sprint-dates">${fmtShort(sprint.start)} – ${fmtShort(sprint.end)}, 2026</span>
        <span class="sprint-counter">${taskDone}/${totalT} tasks &nbsp;(${daysDone % 1 === 0 ? daysDone : daysDone.toFixed(1)}d / ${totalD}d)</span>
        <span class="badge ${badgeClass(status)}">${STATUS_LABEL[status]}</span>
        <span class="sprint-toggle">▶</span>
      </div>
      <div class="sprint-mini-bar"><div class="sprint-mini-fill" style="width:${pct}%"></div></div>
      ${sprint.note ? `<div class="sprint-note">⚠ ${sprint.note}</div>` : ""}
      <div class="sprint-tasks">${taskRows}</div>`;

    // Sprint header toggle
    card.querySelector(".sprint-header").addEventListener("click", () => {
      const nowOpen = card.classList.toggle("open");
      expanded[sprint.id] = nowOpen;
      card.querySelector(".sprint-header").setAttribute("aria-expanded", nowOpen);
      save();
    });

    // Task checkbox toggle
    card.querySelectorAll(".task-row").forEach(row => {
      const toggle = () => {
        const id = row.dataset.taskId;
        checked[id] = !checked[id];

        // Auto-fill end date on check; clear on uncheck if it was auto-filled today
        if (checked[id]) {
          if (!taskDates[id]) taskDates[id] = {};
          if (!taskDates[id].end) {
            taskDates[id].end = todayIso();
            const endInput = row.querySelector('.task-date-input[data-field="end"]');
            if (endInput) endInput.value = todayIso();
          }
        }

        row.classList.toggle("done", checked[id]);
        row.setAttribute("aria-checked", checked[id]);
        save();
        refreshSprintCard(card, sprint);
        computeHeader();
        renderChart();
      };
      row.addEventListener("click", toggle);
      row.addEventListener("keydown", e => { if (e.key === " " || e.key === "Enter") { e.preventDefault(); toggle(); } });
    });

    // Date input changes
    card.querySelectorAll(".task-date-input").forEach(input => {
      input.addEventListener("click",   e => e.stopPropagation());
      input.addEventListener("keydown", e => e.stopPropagation());
      input.addEventListener("change",  e => {
        const id    = e.target.dataset.taskId;
        const field = e.target.dataset.field;
        if (!taskDates[id]) taskDates[id] = {};
        if (e.target.value) taskDates[id][field] = e.target.value;
        else delete taskDates[id][field];
        save();
        renderChart();
      });
    });

    container.appendChild(card);
  });
}

function refreshSprintCard(card, sprint) {
  const status   = sprintStatus(sprint);
  const taskDone = sprint.tasks.filter(t => checked[t.id]).length;
  const daysDone = sprint.tasks.filter(t => checked[t.id]).reduce((a, t) => a + t.days, 0);
  const totalT   = sprint.tasks.length;
  const totalD   = sprint.tasks.reduce((a, t) => a + t.days, 0);
  const pct      = totalD > 0 ? (daysDone / totalD) * 100 : 0;

  card.querySelector(".sprint-counter").textContent =
    `${taskDone}/${totalT} tasks  (${daysDone % 1 === 0 ? daysDone : daysDone.toFixed(1)}d / ${totalD}d)`;
  const badge = card.querySelector(".badge");
  badge.className  = badgeClass(status);
  badge.textContent = STATUS_LABEL[status];
  card.querySelector(".sprint-mini-fill").style.width = pct + "%";
  card.classList.toggle("complete", status === "complete");
  card.classList.toggle("at-risk",  status === "at-risk");
}

// ── Access Banner ──────────────────────────────────────────────────────────
function initBanner() {
  const banner = document.getElementById("access-banner");
  if (localStorage.getItem(BANNER_KEY) === "1") banner.classList.add("hidden");
  document.getElementById("banner-dismiss").addEventListener("click", () => {
    banner.classList.add("hidden");
    localStorage.setItem(BANNER_KEY, "1");
  });
}

// ── Reset ──────────────────────────────────────────────────────────────────
document.getElementById("reset-btn").addEventListener("click", () => {
  if (confirm("Reset all progress and dates? This cannot be undone.")) {
    checked = {}; expanded = {}; taskDates = {};
    localStorage.removeItem(STORAGE_KEY);
    localStorage.removeItem(EXPANDED_KEY);
    localStorage.removeItem(DATES_KEY);
    renderSprints();
    renderChart();
    computeHeader();
    document.getElementById("last-updated").textContent = "never";
  }
});

// ── Save / Load ────────────────────────────────────────────────────────────
document.getElementById("save-btn").addEventListener("click", () => {
  const data = {
    version: 1,
    [STORAGE_KEY]:  JSON.parse(localStorage.getItem(STORAGE_KEY)  || "{}"),
    [EXPANDED_KEY]: JSON.parse(localStorage.getItem(EXPANDED_KEY) || "{}"),
    [DATES_KEY]:    JSON.parse(localStorage.getItem(DATES_KEY)    || "{}"),
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href     = url;
  a.download = "baskety-progress.json";
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById("load-btn").addEventListener("click", () => {
  document.getElementById("load-input").click();
});

document.getElementById("load-input").addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.version) throw new Error("Unrecognised file format.");
      localStorage.setItem(STORAGE_KEY,  JSON.stringify(data[STORAGE_KEY]  || {}));
      localStorage.setItem(EXPANDED_KEY, JSON.stringify(data[EXPANDED_KEY] || {}));
      localStorage.setItem(DATES_KEY,    JSON.stringify(data[DATES_KEY]    || {}));
      checked   = data[STORAGE_KEY]  || {};
      expanded  = data[EXPANDED_KEY] || {};
      taskDates = data[DATES_KEY]    || {};
      renderSprints();
      renderChart();
      computeHeader();
      document.getElementById("last-updated").textContent = new Date().toLocaleString();
    } catch (err) {
      alert("Failed to load file: " + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = "";
});

// ── Init ───────────────────────────────────────────────────────────────────
initBanner();
renderChart();
renderSprints();
computeHeader();
if (localStorage.getItem(STORAGE_KEY)) {
  document.getElementById("last-updated").textContent = "on page load";
}
</script>
</body>
</html>
