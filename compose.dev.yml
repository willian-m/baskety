# Usage:
#   docker compose -f compose.dev.yml up -d
#   export BASKETY_DATABASE_URL=postgres://baskety:baskety@localhost:5432/baskety

# compose.dev.yml — manual/local development only.
# Starts a single Postgres instance so you can run the Go server against a
# real database without a full stack. CI integration tests use testcontainers-go
# and do NOT rely on this file. All credentials are hardcoded — do NOT use in production.

services:
  postgres:
    build:
      context: ./docker/postgres
    command: postgres -c shared_preload_libraries=pg_cron -c cron.database_name=baskety
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: baskety
      POSTGRES_USER: baskety
      POSTGRES_PASSWORD: baskety
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baskety"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
